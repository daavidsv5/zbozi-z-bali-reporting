name: Import dat

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 02:00 SEČ / 03:00 SELČ
  workflow_dispatch:        # Ruční spuštění (tlačítko v aplikaci nebo přes GitHub UI)

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run import
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          ORDERS_SHEET_URL:   ${{ secrets.ORDERS_SHEET_URL }}
          COST_SHEET_URL:     ${{ secrets.COST_SHEET_URL }}
        run: node scripts/importData.js
